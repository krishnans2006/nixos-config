name: "Build and Update Cache"

on:
  pull_request:
  push:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: krishnans2006
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build All Systems
        run: |
          nix build -L \
            '.?submodules=1#nixosConfigurations.krishnan-pc.config.system.build.toplevel' \
            '.?submodules=1#nixosConfigurations.krishnan-lap.config.system.build.toplevel' \
            '.?submodules=1#nixosConfigurations.krishnan-vivo.config.system.build.toplevel'
      - name: Check Flake
        run: nix flake check
      - name: Push to Cachix
        run: cachix push krishnans2006 ./result
